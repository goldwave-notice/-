<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE - ALGORITHM</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { margin: 0; padding: 0; background-color: #0b0d11; font-family: 'Pretendard', sans-serif; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding-top: 80px; padding-bottom: 100px; overflow-x: hidden; }
        .container { width: 92%; max-width: 850px; margin-top: 30px; }

        /* 🟢 랑이가 원했던 원래 그 상단 메뉴 디자인 */
        .top-nav { 
            position: fixed; top: 0; left: 0; width: 100%; height: 75px; 
            background: rgba(5, 6, 8, 0.95); border-bottom: 2px solid #bf953f;
            display: flex; justify-content: center; align-items: center; z-index: 10000;
            backdrop-filter: blur(15px);
        }
        .nav-content { width: 92%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { width: 38px; height: auto; filter: drop-shadow(0 0 5px #bf953f); }
        .nav-links { display: flex; gap: 8px; }
        .nav-link { 
            background: none; border: 1px solid rgba(191,149,63,0.2); color: #fff; padding: 10px 18px; 
            border-radius: 50px; cursor: pointer; font-weight: 800; font-size: 13px; text-decoration: none;
        }
        .nav-link.active { background: rgba(191, 149, 63, 0.2); border-color: #bf953f; color: #bf953f; }

        /* 🟢 캡처본(image_35afd6) 그대로의 네모 박스 레이아웃 */
        .logic-container {
            width: 100%; background-color: #14171d; border: 1px solid rgba(191, 149, 63, 0.3);
            border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); box-sizing: border-box;
        }
        .logic-header {
            display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; color: #bf953f;
            margin-bottom: 35px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;
        }

        /* 📈 엔진 디스플레이 (사이즈 최적화 + 대시보드) */
        .engine-display { width: 100%; height: 380px; background: #000; border-radius: 12px; border: 1px solid #333; display: flex; overflow: hidden; margin-bottom: 30px; }
        .chart-video-area { flex: 1.6; position: relative; border-right: 1px solid #333; overflow: hidden; }
        .chart-video-area video { 
            width: 130%; height: auto; position: absolute; 
            top: 45%; left: 50%; transform: translate(-50%, -50%); 
        }
        
        .terminal-area { flex: 1; background: #000; padding: 15px; font-family: 'Courier New', monospace; font-size: 11px; overflow: hidden; }
        .terminal-header { color: #ffa500; font-weight: 900; border-bottom: 1px solid #333; margin-bottom: 10px; padding-bottom: 5px; display: flex; justify-content: space-between; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .log-line { margin: 5px 0; color: #00ff41; }
        .log-profit { color: #ff3333 !important; font-weight: 900; }

        /* 🟢 고정 문구 (네온 초록색 볼드 포인트) */
        .logic-body p { margin: 15px 0; font-size: 16px; color: #e0e0e0; line-height: 1.8; }
        .highlight-green { color: #00ff41; font-weight: 800; text-shadow: 0 0 5px rgba(0,255,65,0.3); }

        /* 🟢 입체 골드 요약 박스 (내부 박스 디자인) */
        .inner-gold-box {
            background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(191, 149, 63, 0.2);
            border-radius: 15px; padding: 30px; text-align: center; margin-top: 30px;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.05), inset -2px -2px 5px rgba(0,0,0,0.2);
        }
        .inner-gold-box span { color: #bf953f; font-weight: 900; font-size: 18px; font-style: italic; letter-spacing: 1.5px; }

        /* 🟢 런던/뉴욕 세션 섹션 (복구) */
        .session-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; margin-bottom: 60px; width: 100%; }
        .session-card { background: #14171d; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; opacity: 0.4; border-style: dashed; }
        .session-card h3 { color: #bf953f; font-size: 16px; margin: 0; }

        /* 🟢 하단 브랜드 영상들 (복구) */
        .brand-video-box h2 { color: #bf953f; font-size: 20px; margin-bottom: 25px; border-left: 5px solid #bf953f; padding-left: 15px; }
        .brand-video-box video { width: 100%; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; background: #000; }

        .back-home { position: fixed; bottom: 30px; left: 30px; background: #bf953f; color: #000; padding: 16px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; z-index: 1000; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-content">
            <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="nav-logo">
            <div class="nav-links">
                <a href="https://goldwave-notice.github.io/-/dashboard.html" class="nav-link">🏠 홈으로</a>
                <a href="https://goldwave-notice.github.io/-/profit.html" class="nav-link active">알고리즘 가이드</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="logic-container">
            <div class="logic-header">📍 GOLDWAVE 알고리즘 증명: 1. 메인 로직 파동 기반 추세 대응 전략</div>

            <div class="engine-display">
                <div class="chart-video-area">
                    <video autoplay loop muted playsinline>
                        <source src="https://goldwave-notice.github.io/-/수익그래프1.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="terminal-area">
                    <div class="terminal-header"><span>DATA LOG CENTER</span><span style="color:#ffa500;">● LIVE</span></div>
                    <div id="terminal-log"></div>
                </div>
            </div>

            <div class="logic-body">
                <p>시장 흐름(상승/하락 구조)을 기반으로 <span class="highlight-green">확률 높은 구간에서만 진입</span></p>
                <p>단순 지표 진입이 아닌 <span class="highlight-green">구조 + 흐름 + 타점 결합 방식</span>을 채택합니다. <br>
                불필요한 매매 최소화하여 안정적인 수익 누적 구조를 만듭니다.</p>
            </div>

            <div class="inner-gold-box">
                <span>"시장 방향을 따라가는 구조 기반의 핵심 전략"</span>
            </div>
        </div>

        <div class="session-grid">
            <div class="session-card"><h3>2. 런던 세션 로직 (안정형)</h3></div>
            <div class="session-card"><h3>3. 뉴욕 세션 로직 (확장형)</h3></div>
        </div>

        <div class="brand-video-box">
            <h2>GOLD WAVE BRAND STORY</h2>
            <video controls><source src="https://goldwave-notice.github.io/-/1_보완.mp4" type="video/mp4"></video>
            <video controls><source src="https://goldwave-notice.github.io/-/GOLDE WAVE MP4 VOICE.mp4" type="video/mp4"></video>
        </div>
    </div>

    <a href="https://goldwave-notice.github.io/-/dashboard.html" class="back-home">🏠 홈</a>

    <script>
        const logBox = document.getElementById('terminal-log');
        const messages = ["SCANNING XAU/USD...", "WAVE DETECTED: 0.882", "SIGNAL: SUCCESS", "ORDER: #GW-7721", "PROFIT: +$1,245.50", "RISK: STABLE", "PROFIT: +15.42%"];
        function pushLog() {
            const line = document.createElement('div');
            line.className = 'log-line';
            const msg = messages[Math.floor(Math.random() * messages.length)];
            if (msg.includes('+')) line.classList.add('log-profit');
            line.innerText = `> ${msg}`;
            logBox.prepend(line);
            if (logBox.children.length > 15) logBox.removeChild(logBox.lastChild);
        }
        setInterval(pushLog, 400);
    </script>
</body>
</html>
