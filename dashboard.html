<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0d11; /* 럭셔리 다크 배경 */
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 6개 아이콘을 감싸는 컨테이너 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 가로 3개 고정 */
            gap: 15px; /* 아이콘 사이 간격 */
            padding: 20px;
            max-width: 900px; /* 모니터 화면에 너무 퍼지지 않게 제한 */
            width: 95%;
        }

        /* 각 버튼(카드) 스타일 */
        .nav-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            aspect-ratio: 546 / 402; /* 랑랑쌤이 만든 이미지 비율로 강제 통일 */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* 이미지 픽셀 강제 조절 (균형 핵심) */
        .nav-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 비율이 달라도 꽉 차게 조절 */
            display: block;
        }

        /* 마우스 올렸을 때 효과 */
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(191, 149, 63, 0.3); /* 골드빛 그림자 */
        }

        /* 모바일 대응 (화면 작아지면 2열로) */
        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        <div class="nav-card" onclick="window.open('https://goldwave-notice.github.io/guide.html')">
            <img src="https://i.imgur.com/LLMMLE6.png" alt="사용설명서">
        </div>

        <div class="nav-card" onclick="window.open('https://goldwave-notice.github.io/profit.html')">
            <img src="https://i.imgur.com/EHzDZon.png" alt="수익현황">
        </div>

        <div class="nav-card" onclick="window.open('https://goldwave-notice.github.io/archive.html')">
            <img src="https://i.imgur.com/TKsOsPT.png" alt="아카이브">
        </div>

        <div class="nav-card" onclick="window.open('https://goldwave-notice.github.io/program.html')">
            <img src="https://i.imgur.com/Xles7rX.png" alt="프로그램">
        </div>

        <div class="nav-card" onclick="window.open('https://goldwave-notice.github.io/faq.html')">
            <img src="https://i.imgur.com/XCVCrRj.png" alt="FAQ">
        </div>

        <div class="nav-card" onclick="window.open('https://goldwave-notice.github.io/remote.html')">
            <img src="https://i.imgur.com/CYBeRLN.png" alt="원격지원">
        </div>
    </div>

</body>
</html>
