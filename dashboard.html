<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Pretendard:wght@300;700&display=swap" rel="stylesheet">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 히어로 섹션 (심연의 블랙 + 금가루 레이어) */
        .hero-section {
            width: 100%;
            background-color: #000000;
            /* ⭐ 이미지 경로 대신 코드로 금가루 파티클 느낌 구현 ⭐ */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(191, 149, 63, 0.2) 1.5px, transparent 1.5px),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0.5px, transparent 0.5px),
                linear-gradient(180deg, rgba(0,0,0,0) 70%, rgba(191,149,63,0.1) 100%);
            background-size: 30px 30px, 50px 50px, 20px 20px, 100% 100%;
            padding: 55px 0 65px 0;
            text-align: center;
            position: relative;
            border-bottom: 3px solid #bf953f;
        }

        /* 랑랑쌤의 최애: 맥박 뛰는 골드 로고 */
        .premium-logo {
            width: 70px;
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
            animation: gold-pulse 2.5s infinite ease-in-out;
        }

        @keyframes gold-pulse {
            0% { filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); transform: scale(1.08); }
            100% { filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.4)); transform: scale(1); }
        }

        /* 쨍! 한 골드 텍스트 (블러 완전 제거) */
        .brand-title {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 44px;
            letter-spacing: 8px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            position: relative;
            z-index: 10;
            background: linear-gradient(to bottom, #fff6a5 0%, #ffcc00 25%, #bf953f 50%, #fcf6ba 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1px #bf953f; 
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.9));
        }

        /* 영문 슬로건 */
        .slogan-en {
            margin-top: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px; /* 기준 크기 */
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ⭐ 한글 슬로건: 1.5배 작고 가는 폰트 ⭐ */
        .slogan-ko {
            margin-top: 8px;
            font-family: 'Pretendard', sans-serif;
            font-size: 10px; /* 15px 기준 약 1.5배 작은 10px */
            font-weight: 300; /* 아주 가는 폰트체 */
            color: #c0c0c0; /* 세련된 연회색 금속 느낌 */
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* 2. 하단 콘텐츠 영역 */
        .content-container {
            width: 100%;
            max-width: 950px;
            padding: 40px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 6px 18px;
            background: #ffffff;
            border: 1px solid #bf953f;
            border-radius: 25px;
            box-shadow: 0 4px 12px rgba(191, 149, 63, 0.15);
        }

        .status-dot {
            width: 9px; height: 9px;
            background-color: #00ff00;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #00ff00;
            animation: light-blink 1.5s infinite;
        }

        @keyframes light-blink {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .info-bar {
            margin-bottom: 40px;
            font-size: 14px;
            color: #888;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .nav-card {
            border-radius: 20px;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            aspect-ratio: 546 / 402;
            box-shadow: 0 6px 25px rgba(0,0,0,0.06);
            border: 1px solid #f2f2f2;
            overflow: hidden;
        }

        .nav-card img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(191, 149, 63, 0.25);
            border: 2px solid #bf953f;
        }

        @media (max-width: 700px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .brand-title { font-size: 30px; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="premium-logo">
        <h1 class="brand-title">GOLD WAVE</h1>
        <div class="slogan-en">STAY AHEAD, RIGHT HERE.</div>
        <div class="slogan-ko">앞서 나가고 싶은 당신, 이곳이 바로 출발점입니다.</div>
    </div>

    <div class="content-container">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span style="color: #bf953f; font-size: 12px; font-weight: 900; letter-spacing: 1px;">SYSTEM STATUS: ACTIVE</span>
        </div>

        <div class="info-bar">
            <span id="date-display"></span>
            <span style="margin: 0 10px; opacity: 0.3;">|</span>
            <span>VIEWS: <span id="busuanzi_value_site_pv" style="color: #b38728; font-weight: 800;">0</span></span>
        </div>

        <div class="dashboard-grid">
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/guide.html'"><img src="https://i.imgur.com/C5xMVYm.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/profit.html'"><img src="https://i.imgur.com/EHzDZon.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/archive.html'"><img src="https://i.imgur.com/TKsOsPT.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/program.html'"><img src="https://i.imgur.com/Xles7rX.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/faq.html'"><img src="https://i.imgur.com/XCVCrRj.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/remote.html'"><img src="https://i.imgur.com/CYBeRLN.png"></div>
        </div>
    </div>

    <script>
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('date-display').innerText = `📅 ${y}.${m}.${d}`;
    </script>
</body>
</html>
