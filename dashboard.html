<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Pretendard:wght@100;300;700&display=swap" rel="stylesheet">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 히어로 섹션 (스타더스트 배경) */
        .hero-section {
            width: 100%;
            background-color: #000000;
            /* 무작위로 흩뿌려진 금가루 파티클 효과 */
            background-image: 
                radial-gradient(1px 1px at 10% 20%, #ffffff 100%, transparent),
                radial-gradient(1.5px 1.5px at 35% 45%, #bf953f 100%, transparent),
                radial-gradient(2px 2px at 70% 15%, #ffcc00 100%, transparent),
                radial-gradient(1px 1px at 85% 80%, #ffffff 80%, transparent),
                radial-gradient(2px 2px at 50% 60%, #bf953f 100%, transparent),
                radial-gradient(1.5px 1.5px at 20% 85%, #ffcc00 100%, transparent);
            background-size: 250px 250px, 350px 350px, 400px 400px, 200px 200px, 300px 300px, 280px 280px;
            padding: 60px 0 65px 0;
            text-align: center;
            position: relative;
            border-bottom: 3px solid #bf953f;
        }

        /* 로고 맥박(숨쉬기) 애니메이션 */
        .premium-logo {
            width: 70px;
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
            animation: gold-pulse 2.5s infinite ease-in-out;
        }

        @keyframes gold-pulse {
            0% { filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); transform: scale(1.08); }
            100% { filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.4)); transform: scale(1); }
        }

        /* 쨍한 골드 브랜드 타이틀 */
        .brand-title {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 46px;
            letter-spacing: 8px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            position: relative;
            z-index: 10;
            background: linear-gradient(to bottom, #fff6a5 0%, #ffcc00 25%, #bf953f 50%, #fcf6ba 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1px #bf953f; 
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.9));
        }

        /* 영문 슬로건 */
        .slogan-en {
            margin-top: 15px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 한글 슬로건 (가는 Sans 계열) */
        .slogan-ko {
            margin-top: 10px;
            font-family: 'Pretendard', sans-serif;
            font-size: 10.5px;
            font-weight: 100;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        /* [2] 하단 콘텐츠 영역 */
        .content-container {
            width: 100%;
            max-width: 950px;
            padding: 40px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 시스템 상태 표시바 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 6px 18px;
            background: #ffffff;
            border: 1px solid #bf953f;
            border-radius: 25px;
            box-shadow: 0 4px 12px rgba(191, 149, 63, 0.15);
        }

        .status-dot {
            width: 9px; height: 9px;
            background-color: #00ff00;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #00ff00;
            animation: light-blink 1.5s infinite;
        }

        @keyframes light-blink {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .info-bar { margin-bottom: 40px; font-size: 14px; color: #888; font-weight: 700; letter-spacing: 1px; }

        /* 아이콘 그리드 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .nav-card {
            border-radius: 20px;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            aspect-ratio: 546 / 402;
            box-shadow: 0 6px 25px rgba(0,0,0,0.06);
            border: 1px solid #f2f2f2;
            overflow: hidden;
        }

        .nav-card img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .nav-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px rgba(191, 149, 63, 0.25); border: 2px solid #bf953f; }

        /* ⭐ [핵심] 우측 하단 플로팅 CTA 통합 섹션 ⭐ */
        .floating-cta-container {
            position: fixed; /* 스크롤을 따라다니는 마법 */
            bottom: 30px;
            right: 30px;
            z-index: 9999; /* 무조건 맨 위에 */
            display: flex;
            flex-direction: column; /* 세로로 배치 */
            align-items: center; /* 중앙 정렬 */
            gap: 15px; /* 동전 세트와 카톡 버튼 사이 여백 */
        }

        /* (1) VVIP 메달 버튼 세트 (텔레그램) */
        .medal-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; }

        .gold-medal {
            width: 130px; /* 슬림한 사이즈 고정 */
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            animation: coin-rotate 6s infinite linear; /* 빙글빙글 회전 애니메이션 */
            transition: all 0.3s;
        }

        @keyframes coin-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); } /* 3D로 한바퀴 핑그르르 */
        }

        /* ⭐ 동전과 글자 사이 공간 싹 줄임 ( margin-top: 5px) ⭐ */
        .medal-text {
            margin: 5px 0 0 0; /* 공간 싹 줄임 */
            font-family: 'Pretendard', sans-serif;
            font-size: 11px; /* 영문 대비 축소 */
            font-weight: 300; /* 가는 Sans 서체 */
            color: #aa771c; /* 클래식 골드 색상 */
            letter-spacing: 1px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8); /* 가독성을 위한 은은한 배경 */
            padding: 3px 8px;
            border-radius: 10px;
            transition: color 0.3s;
        }

        /* 랑랑쌤의 호버 효과 유지 (회전 멈춤 & 강조) */
        .medal-link:hover .gold-medal {
            animation-play-state: paused; /* 호버 시 회전 정지 */
            transform: scale(1.1);
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
        }
        .medal-link:hover .medal-text { color: #bf953f; }

        /* (2) ⭐ 카카오톡 문의하기 버튼 ⭐ */
        .kakao-link { text-decoration: none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .kakao-icon {
            width: 130px; /* 동전과 사이즈 일치 */
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* 카톡 버튼 호버 효과 (위로 살짝 커짐) */
        .kakao-link:hover { transform: translateY(-8px) scale(1.05); }

        /* 모바일 대응 */
        @media (max-width: 700px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .brand-title { font-size: 30px; }
            .floating-cta-container { right: 20px; bottom: 20px; gap: 10px; }
            .gold-medal, .kakao-icon { width: 100px; } /* 모바일에서는 더 작게 */
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="premium-logo">
        <h1 class="brand-title">GOLD WAVE</h1>
        <div class="slogan-en">STAY AHEAD, RIGHT HERE.</div>
        <div class="slogan-ko">앞서 나가고 싶은 당신, 이곳이 바로 출발점입니다.</div>
    </div>

    <div class="content-container">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span style="color: #bf953f; font-size: 12px; font-weight: 900; letter-spacing: 1px;">SYSTEM STATUS: ACTIVE</span>
        </div>

        <div class="info-bar">
            <span id="date-display"></span>
            <span style="margin: 0 10px; opacity: 0.3;">|</span>
            <span>VIEWS: <span id="busuanzi_value_site_pv" style="color: #b38728; font-weight: 800;">0</span></span>
        </div>

        <div class="dashboard-grid">
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/guide.html'"><img src="https://i.imgur.com/C5xMVYm.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/profit.html'"><img src="https://i.imgur.com/EHzDZon.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/archive.html'"><img src="https://i.imgur.com/TKsOsPT.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/program.html'"><img src="https://i.imgur.com/Xles7Xq.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/faq.html'"><img src="https://i.imgur.com/XCVCrRj.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/remote.html'"><img src="https://i.imgur.com/CYBeRLN.png"></div>
        </div>
    </div>

    <div class="floating-cta-container">
        
        <a href="텔레그램_채널_링크" target="_blank" class="medal-link">
            <img src="https://i.imgur.com/71d0VYw.png" alt="VVIP Medal" class="gold-medal">
            <p class="medal-text">텔레그램 공지방<br>채널 바로가기</p>
        </a>

        <a href="카카오톡_문의_링크" target="_blank" class="kakao-link">
            <img src="https://i.imgur.com/73WFeLl.png" alt="카카오톡 문의하기" class="kakao-icon">
        </a>
    </div>

    <script>
        // 오늘 날짜 자동 생성
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('date-display').innerText = `📅 ${y}.${m}.${d}`;
    </script>
</body>
</html>
