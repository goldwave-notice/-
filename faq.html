<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE - FAQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { margin: 0; padding: 0; background-color: #0b0d11; font-family: 'Pretendard', sans-serif; color: #e0e0e0; line-height: 1.7; }

        /* 🔴 랑이 요청: 상단 고정 헤더 디자인 (image_8d3181 스타일) */
        .header-sticky { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(26, 29, 35, 0.95); 
            border-bottom: 1px solid rgba(191, 149, 63, 0.3); 
            z-index: 1000; padding: 15px 0; 
            text-align: center; backdrop-filter: blur(10px); 
        }
        .header-title { font-size: 13px; font-weight: 800; color: #bf953f; letter-spacing: 1px; }

        /* 🔴 랑이 요청: [홈] 대신 뒤로가기 화살표 (상단 왼쪽 배치) */
        .back-nav {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            text-decoration: none; color: #bf953f; font-size: 20px;
            transition: 0.3s;
        }
        .back-nav:hover { filter: drop-shadow(0 0 8px #bf953f); transform: translateY(-50%) translateX(-3px); }

        .container { width: 92%; max-width: 600px; margin: 100px auto 100px; }
        
        /* 기존 디자인 유지 구간 */
        .brand-section { text-align: center; margin-bottom: 50px; }
        .brand-logo { width: 55px; margin-bottom: 15px; filter: drop-shadow(0 0 8px rgba(191, 149, 63, 0.5)); }
        h1 { color: #bf953f; font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .sub-title { color: #aaa; font-size: 15px; margin-top: 8px; font-weight: 700; }

        .faq-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(191, 149, 63, 0.15); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .faq-question { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 15px; display: flex; align-items: flex-start; gap: 12px; }
        .faq-question span { color: #bf953f; flex-shrink: 0; }
        .faq-answer { background: rgba(191, 149, 63, 0.05); padding: 15px 20px; border-radius: 12px; font-size: 15px; color: #bbb; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="header-sticky">
        <a href="dashboard-new.html" class="back-nav"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="header-title">GOLD WAVE FAQ</div>
    </div>

    <div class="container">
        <div class="brand-section">
            <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="brand-logo">
            <h1>GOLD WAVE FAQ</h1>
            <p class="sub-title">자주 묻는 질문 및 해결 방법</p>
        </div>

        <div class="faq-item">
            <div class="faq-question"><span>Q.</span> 프로그램 설치는 어떻게 하나요?</div>
            <div class="faq-answer">이용 가이드 탭의 '프로그램 설치방법' 영상을 참고하시면 누구나 쉽게 설치 가능합니다.</div>
        </div>

        <div class="faq-item">
            <div class="faq-question"><span>Q.</span> 모바일에서도 확인이 가능한가요?</div>
            <div class="faq-answer">네, 텔레그램 공식 채널 및 공지 사이트를 통해 실시간 현황을 언제 어디서나 확인하실 수 있습니다.</div>
        </div>
    </div>

</body>
</html>
