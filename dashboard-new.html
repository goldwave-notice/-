<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE - PORTAL DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap');
        
        body { margin: 0; padding: 0; background-color: #0b0d11; font-family: 'Pretendard', sans-serif; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* 1. 상단 헤더 & 고급 타이틀 */
        .portal-header { text-align: center; margin-top: 60px; margin-bottom: 40px; padding: 0 20px; }
        .brand-logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        .logo-img-small { width: 45px; height: auto; filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.4)); }
        
        .logo-text-title {
            color: #bf953f; font-size: 48px; font-weight: 200; letter-spacing: 12px; margin: 0;
            font-family: 'Montserrat', sans-serif; text-transform: uppercase;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.2));
        }
        
        .sub-copy { color: #555; font-size: 13px; letter-spacing: 4px; margin-top: 20px; font-weight: 400; text-transform: uppercase; }

        /* 2. 스테이터스 바 */
        .status-bar {
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 100px; padding: 15px 35px; display: flex; align-items: center; gap: 20px;
            margin-bottom: 50px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        .status-item { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 700; }
        .status-label { color: #444; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        .status-value { color: #aaa; }
        .status-value.gold { color: #bf953f; font-weight: 800; }

        /* ● SYSTEM ACTIVE 초록불 */
        .active-dot {
            width: 7px; height: 7px; background-color: #00ff41; border-radius: 50%;
            display: inline-block; box-shadow: 0 0 10px #00ff41; animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } }
        .system-text { color: #00ff41; letter-spacing: 1.5px; font-size: 11px; font-weight: 800; }

        /* 3. 메뉴 그리드 & 카드 (반응형 핵심!) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* PC는 3열 */
            gap: 20px; width: 92%; max-width: 1000px; margin-bottom: 60px;
        }
        
        .menu-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 40px 25px; text-decoration: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex; flex-direction: column; gap: 20px; min-height: 120px;
        }
        
        .card-icon-fa { font-size: 32px; color: #bf953f; opacity: 0.5; transition: 0.4s; }
        .card-title { color: #dcdcdc; font-size: 17px; font-weight: 800; line-height: 1.4; }
        .card-desc { color: #444; font-size: 12px; font-weight: 500; }

        .menu-card:hover {
            transform: translateY(-8px); background: rgba(191, 149, 63, 0.04);
            border-color: #bf953f; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .menu-card:hover .card-icon-fa { opacity: 1; filter: drop-shadow(0 0 10px #bf953f); }

        /* 4. 하단 버튼 */
        .footer-links { display: flex; gap: 15px; margin-bottom: 80px; flex-wrap: wrap; justify-content: center; }
        .f-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px; padding: 12px 22px; color: #777; font-size: 12px;
            text-decoration: none; display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .f-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }

        /* 📱 모바일 최적화 (반응형 코드) */
        @media (max-width: 768px) {
            .logo-text-title { font-size: 32px; letter-spacing: 6px; } /* 자간 축소 */
            .logo-img-small { width: 35px; }
            .status-bar { padding: 12px 20px; gap: 12px; flex-wrap: wrap; justify-content: center; border-radius: 20px; }
            .menu-grid { grid-template-columns: 1fr; } /* 모바일 1열 전환 */
            .menu-card { padding: 30px 20px; flex-direction: row; align-items: center; gap: 20px; }
            .card-icon-fa { font-size: 24px; }
            .card-title { font-size: 15px; }
            .footer-links { flex-direction: column; width: 90%; }
            .f-btn { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

    <header class="portal-header">
        <div class="brand-logo-area">
            <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="logo-img-small">
            <h1 class="logo-text-title">GOLD WAVE</h1> 
        </div>
        <div class="sub-copy">STAY AHEAD, RIGHT HERE</div>
    </header>

    <div class="status-bar">
        <div class="status-item"><span class="active-dot"></span><span class="system-text">SYSTEM ACTIVE</span></div>
        <div class="status-item"><span class="status-label">DATE</span><span id="date-display" class="status-value"></span></div>
        <div class="status-item"><span class="status-label">TODAY</span><span id="today-count" class="status-value gold">0</span></div>
        <div class="status-item"><span class="status-label">TOTAL</span><span id="total-count" class="status-value gold">0</span></div>
    </div>

    <main class="menu-grid">
        <a href="가이드.html" class="menu-card"><i class="fa-solid fa-book-open-reader card-icon-fa"></i><div><div class="card-title">골드웨이브 프로그램<br>초간단 사용 설명서</div><div class="card-desc">빠르게 시작하는 가이드</div></div></a>
        <a href="faq.html" class="menu-card"><i class="fa-solid fa-comments card-icon-fa"></i><div><div class="card-title">FAQ<br>자주 묻는 질문</div><div class="card-desc">궁금증 해결</div></div></a>
        <a href="profit.html" class="menu-card"><i class="fa-solid fa-chart-line card-icon-fa"></i><div><div class="card-title">골드웨이브 프리미엄<br>노티스 (수익현황)</div><div class="card-desc">실시간 수익 및 공지</div></div></a>
        <a href="아카이브.html" class="menu-card"><i class="fa-solid fa-file-invoice card-icon-fa"></i><div><div class="card-title">1분 브리핑<br>리포트 아카이브</div><div class="card-desc">일간 리포트 모음</div></div></a>
        <a href="program.html" class="menu-card"><i class="fa-solid fa-gears card-icon-fa"></i><div><div class="card-title">프로그램 소개</div><div class="card-desc">전략과 철학 소개</div></div></a>
        <a href="remote.html" class="menu-card"><i class="fa-solid fa-headset card-icon-fa"></i><div><div class="card-title">원격 지원 시스템</div><div class="card-desc">실시간 전담 지원</div></div></a>
    </main>

    <footer class="footer-links">
        <a href="https://t.me/goldwave_notice" class="f-btn"><i class="fa-brands fa-telegram"></i> 골드웨이브 공식 채널</a>
        <a href="http://pf.kakao.com/_RxfuxdG" class="f-btn"><i class="fa-solid fa-comment-dots"></i> 카카오톡 상담문의</a>
    </footer>

    <script>
        const todayObj = new Date();
        const y = todayObj.getFullYear();
        const m = String(todayObj.getMonth() + 1).padStart(2, '0');
        const d = String(todayObj.getDate()).padStart(2, '0');
        document.getElementById('date-display').innerText = `${y}.${m}.${d}`;

        function updateCounters() {
            const todayStr = todayObj.toLocaleDateString();
            let dailyData = JSON.parse(localStorage.getItem('gw_daily')) || { date: "", count: 0 };
            
            // 날짜 체크 및 카운팅
            if (dailyData.date !== todayStr) {
                dailyData = { date: todayStr, count: Math.floor(Math.random() * 5) + 1 };
            } else {
                dailyData.count += (Math.floor(Math.random() * 2) + 1);
            }
            localStorage.setItem('gw_daily', JSON.stringify(dailyData));
            document.getElementById('today-count').innerText = dailyData.count;

            // 전체 카운팅
            let totalCount = parseInt(localStorage.getItem('gw_total')) || 1527;
            totalCount += (Math.floor(Math.random() * 3) + 2);
            localStorage.setItem('gw_total', totalCount);
            document.getElementById('total-count').innerText = totalCount.toLocaleString();
        }
        window.onload = updateCounters;
    </script>
</body>
</html>
