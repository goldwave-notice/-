<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>GOLD WAVE - PORTAL DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap');
        
        body { 
            margin: 0; padding: 0; background-color: #0b0d11; 
            font-family: 'Pretendard', sans-serif; color: #e0e0e0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; 
            /* 🔴 여기가 핵심: PC에서 왼쪽 쏠림 방지 */
            width: 100%; /* 바디 자체는 100% */
        }

        /* 콘텐츠 전체를 감싸는 컨테이너 추가 (중앙 정렬용) */
        .main-wrapper {
            width: 1200px;
            margin: 0 auto; /* 좌우 여백 자동 계산 -> 중앙 정렬 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 헤더 */
        .portal-header { text-align: center; margin-top: 90px; margin-bottom: 50px; }
        .brand-logo-area { display: flex; align-items: center; justify-content: center; gap: 25px; }
        .logo-img-small { width: 55px; height: auto; filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.3)); }
        .logo-text-title {
            color: #bf953f; font-size: 52px; font-weight: 200; letter-spacing: 12px; margin: 0;
            font-family: 'Montserrat', sans-serif; text-transform: uppercase;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(191, 149, 63, 0.2));
        }
        .sub-copy { color: #666; font-size: 14px; letter-spacing: 5px; margin-top: 25px; text-transform: uppercase; }

        /* 2. 스테이터스 바 */
        .status-bar {
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 100px; padding: 18px 45px; display: flex; align-items: center; gap: 35px;
            margin-bottom: 75px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        .status-item { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 700; }
        .status-label { color: #444; font-size: 10px; letter-spacing: 2px; }
        .status-value.gold { color: #bf953f; font-weight: 800; }
        .active-dot { width: 8px; height: 8px; background-color: #00ff41; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } }

        /* 3. 메뉴 그리드 & 호버 효과 */
        .menu-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 30px; width: 1000px; margin-bottom: 100px;
        }
        .menu-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 22px; padding: 55px 35px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 25px;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .card-icon-fa { font-size: 38px; color: #bf953f; opacity: 0.5; transition: all 0.4s ease; }
        .card-title { color: #dcdcdc; font-size: 19px; font-weight: 800; line-height: 1.4; word-break: keep-all; }

        .menu-card:hover { 
            transform: translateY(-15px); border-color: #bf953f; 
            background: rgba(191, 149, 63, 0.05); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(191, 149, 63, 0.2);
        }
        .menu-card:hover .card-icon-fa { opacity: 1; filter: drop-shadow(0 0 15px #bf953f); transform: scale(1.1); }
        .menu-card:hover .card-title { color: #fff; }

        /* 4. 하단 버튼 */
        .footer-links { display: flex; gap: 20px; margin-bottom: 120px; }
        .f-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px; padding: 14px 28px; color: #777; font-size: 13px;
            text-decoration: none; display: flex; align-items: center; gap: 12px; transition: 0.3s;
        }
        .f-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; border-color: #aaa; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="portal-header">
            <div class="brand-logo-area">
                <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="logo-img-small">
                <h1 class="logo-text-title">GOLD WAVE</h1> 
            </div>
            <div class="sub-copy">STAY AHEAD, RIGHT HERE</div>
        </header>

        <div class="status-bar">
            <div class="status-item"><span class="active-dot"></span><span style="color:#00ff41; font-weight:800; letter-spacing:2px;">ACTIVE</span></div>
            <div class="status-item"><span class="status-label">DATE</span><span id="date-display" class="status-value"></span></div>
            <div class="status-item"><span class="status-label">TODAY</span><span id="today-count" class="status-value gold">0</span></div>
            <div class="status-item"><span class="status-label">TOTAL</span><span id="total-count" class="status-value gold">0</span></div>
        </div>

        <main class="menu-grid">
            <a href="가이드.html" class="menu-card">
                <i class="fa-solid fa-book-open-reader card-icon-fa"></i>
                <div class="card-title">골드웨이브 프로그램<br>초간단 사용 설명서</div>
            </a>
            <a href="faq.html" class="menu-card">
                <i class="fa-solid fa-comments card-icon-fa"></i>
                <div class="card-title">FAQ<br>자주 묻는 질문</div>
            </a>
            <a href="profit.html" class="menu-card">
                <i class="fa-solid fa-chart-line card-icon-fa"></i>
                <div class="card-title">골드웨이브 프리미엄<br>노티스 (수익현황)</div>
            </a>
            <a href="아카이브.html" class="menu-card">
                <i class="fa-solid fa-file-invoice card-icon-fa"></i>
                <div class="card-title">1분 브리핑<br>리포트 아카이브</div>
            </a>
            <a href="program.html" class="menu-card">
                <i class="fa-solid fa-gears card-icon-fa"></i>
                <div class="card-title">프로그램 소개</div>
            </a>
            <a href="remote.html" class="menu-card">
                <i class="fa-solid fa-headset card-icon-fa"></i>
                <div class="card-title">원격 지원 시스템</div>
            </a>
        </main>

        <footer class="footer-links">
            <a href="https://t.me/goldwave_notice" class="f-btn"><i class="fa-brands fa-telegram"></i> 골드웨이브 공식 채널</a>
            <a href="http://pf.kakao.com/_RxfuxdG" class="f-btn"><i class="fa-solid fa-comment-dots"></i> 카카오톡 상담문의</a>
        </footer>
    </div>
    <script>
        const todayObj = new Date();
        const y = todayObj.getFullYear();
        const m = String(todayObj.getMonth() + 1).padStart(2, '0');
        const d = String(todayObj.getDate()).padStart(2, '0');
        document.getElementById('date-display').innerText = `${y}.${m}.${d}`;

        function updateCounters() {
            const todayStr = todayObj.toLocaleDateString();
            let dailyData = JSON.parse(localStorage.getItem('gw_daily')) || { date: "", count: 0 };
            if (dailyData.date !== todayStr) { 
                dailyData = { date: todayStr, count: Math.floor(Math.random() * 5) + 1 }; 
            } else { 
                dailyData.count += (Math.floor(Math.random() * 2) + 1); 
            }
            localStorage.setItem('gw_daily', JSON.stringify(dailyData));
            document.getElementById('today-count').innerText = dailyData.count;

            let totalCount = parseInt(localStorage.getItem('gw_total')) || 1527;
            totalCount += (Math.floor(Math.random() * 3) + 2);
            localStorage.setItem('gw_total', totalCount);
            document.getElementById('total-count').innerText = totalCount.toLocaleString();
        }
        window.onload = updateCounters;
    </script>
</body>
</html>
